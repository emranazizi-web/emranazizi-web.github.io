<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emran // Dev Mode</title>

  <style>
    body {
      margin: 0;
      background: #050505;
      color: #00ff88;
      font-family: "Courier New", monospace;
    }

    .container {
      padding: 80px 20px;
      text-align: center;
    }

    h1 {
      font-size: 40px;
      text-shadow: 0 0 10px #00ff88;
    }

    p {
      color: #b6ffda;
      font-size: 18px;
    }

    .box {
      border: 1px solid #00ff88;
      padding: 20px;
      margin: 20px auto;
      max-width: 600px;
      box-shadow: 0 0 15px #00ff88;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 20px;
      border: 1px solid #00ff88;
      color: #00ff88;
      text-decoration: none;
      transition: 0.3s;
    }

    .btn:hover {
      background: #00ff88;
      color: #000;
    }

    .cursor {
      animation: blink 1s infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>> Emran.exe <span class="cursor">_</span></h1>
    <p>Software Engineering Student // System Initializing...</p>

    <div class="box">
      <p>> About_Me</p>
      <p>I am learning programming, building systems, and exploring web development.</p>
    </div>

    <div class="box">
      <p>> Mission</p>
      <p>Become a professional developer and build powerful applications.</p>
    </div>

    <a class="btn" href="#">CONTACT_TERMINAL</a>
  </div>

</body>
</html>
