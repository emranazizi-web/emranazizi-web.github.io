<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CYBER GTA ULTIMATE OFFLINE</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}

body{
  background:#000;
  overflow:hidden;
  color:#00ffcc;
}

/* MATRIX */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-10;
}

/* GRID CITY */
.grid{
  position:fixed;
  width:4000px;
  height:4000px;
  background-image:
    linear-gradient(rgba(0,255,204,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,204,0.05) 1px, transparent 1px);
  background-size:50px 50px;
  z-index:-9;
}

/* PLAYER */
.player{
  width:25px;height:25px;
  background:#00ffcc;
  border-radius:50%;
  position:absolute;
  box-shadow:0 0 10px #00ffcc;
}

/* BOTS */
.bot{
  width:20px;height:20px;
  background:red;
  border-radius:50%;
  position:absolute;
}

/* ENEMY */
.enemy{
  width:18px;height:18px;
  background:orange;
  border-radius:50%;
  position:absolute;
}

/* BULLET */
.bullet{
  width:6px;height:6px;
  background:yellow;
  border-radius:50%;
  position:absolute;
}

/* LION */
#lion{
  position:fixed;
  width:120px;height:120px;
  background:url("https://upload.wikimedia.org/wikipedia/commons/7/73/Lion_waiting_in_Namibia.jpg");
  background-size:cover;
  border-radius:15px;
  z-index:-8;
  filter:drop-shadow(0 0 10px orange);
}

/* HUD */
#hud{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  padding:10px;
  background:rgba(0,0,0,0.7);
  border-bottom:1px solid #00ffcc;
  z-index:10;
}

.health{
  color:#ff5555;
}

</style>
</head>

<body>

<div class="grid"></div>
<div id="lion"></div>

<div id="hud">
  <div>CYBER GTA ULTIMATE</div>
  <div class="health">HEALTH: <span id="hp">100</span></div>
</div>

<div class="world">
  <div class="player" id="me"></div>
</div>

<canvas id="matrix"></canvas>

<script>

/* PLAYER */
let x=1500,y=1500;
let hp=100;
let me=document.getElementById("me");
let hpText=document.getElementById("hp");

/* MOVE */
document.addEventListener("keydown",(e)=>{
  if(e.key==="w") y-=10;
  if(e.key==="s") y+=10;
  if(e.key==="a") x-=10;
  if(e.key==="d") x+=10;

  me.style.left=x+"px";
  me.style.top=y+"px";
});

/* SHOOT */
document.addEventListener("click",(e)=>{

  let b=document.createElement("div");
  b.className="bullet";

  let bx=x, by=y;

  let dx=e.clientX-window.innerWidth/2;
  let dy=e.clientY-window.innerHeight/2;

  b.style.left=bx+"px";
  b.style.top=by+"px";
  document.body.appendChild(b);

  let move=setInterval(()=>{

    bx+=dx/18;
    by+=dy/18;

    b.style.left=bx+"px";
    b.style.top=by+"px";

    document.querySelectorAll(".enemy").forEach(en=>{
      if(Math.abs(en.offsetLeft-bx)<20 && Math.abs(en.offsetTop-by)<20){
        en.remove();
      }
    });

  },20);

  setTimeout(()=>{b.remove();clearInterval(move);},1500);
});

/* ENEMIES */
for(let i=0;i<12;i++){
  let e=document.createElement("div");
  e.className="enemy";
  e.style.left=Math.random()*3000+"px";
  e.style.top=Math.random()*3000+"px";
  document.body.appendChild(e);
}

/* BOT AI */
for(let i=0;i<6;i++){
  let b=document.createElement("div");
  b.className="bot";
  b.style.left=Math.random()*3000+"px";
  b.style.top=Math.random()*3000+"px";
  document.body.appendChild(b);

  setInterval(()=>{
    b.style.left=parseInt(b.style.left)+Math.random()*20-10+"px";
    b.style.top=parseInt(b.style.top)+Math.random()*20-10+"px";
  },200);
}

/* LION AI */
let lx=100,ly=200;

function lionAI(){
  let dx=x-lx;
  let dy=y-ly;
  let dist=Math.sqrt(dx*dx+dy*dy);

  if(dist<500){
    lx+=dx*0.03;
    ly+=dy*0.03;

    hp-=0.05;
    hpText.innerText=Math.floor(hp);
  }else{
    lx+=Math.sin(Date.now()/500)*2;
    ly+=Math.cos(Date.now()/500)*2;
  }

  let lion=document.getElementById("lion");
  lion.style.left=lx+"px";
  lion.style.top=ly+"px";

  if(hp<=0){
    me.style.background="red";
    me.innerText="💀";
  }
}
setInterval(lionAI,30);

/* MATRIX */
const c=document.getElementById("matrix");
const ctx=c.getContext("2d");

c.width=window.innerWidth;
c.height=window.innerHeight;

let letters="01";
let font=14;
let cols=c.width/font;
let drops=Array(Math.floor(cols)).fill(1);

function draw(){
  ctx.fillStyle="rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,c.width,c.height);

  ctx.fillStyle="#00ffcc";
  ctx.font=font+"px monospace";

  for(let i=0;i<drops.length;i++){
    let t=letters[Math.floor(Math.random()*letters.length)];
    ctx.fillText(t,i*font,drops[i]*font);

    if(drops[i]*font>c.height) drops[i]=0;
    drops[i]++;
  }
}
setInterval(draw,30);

</script>

</body>
</html>
